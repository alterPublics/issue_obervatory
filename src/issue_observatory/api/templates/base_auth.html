<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} — The Issue Observatory</title>
    <link rel="icon" href="{{ url_for('static', path='images/brand/favicon.ico') }}" type="image/x-icon">

    {# Web fonts #}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

    {# TODO: Replace with compiled app.css for production (make css). #}
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50:  '#F3E8FF',
                            100: '#E9D5FF',
                            200: '#D8B4FE',
                            300: '#C084FC',
                            400: '#A855F7',
                            500: '#7C3AED',
                            600: '#4A1080',
                            700: '#3B0764',
                            800: '#2E0550',
                            900: '#1E0338',
                            950: '#120D1F',
                        },
                        surface: {
                            base:     '#0F0A1A',
                            card:     '#1A1225',
                            elevated: '#231A30',
                            input:    '#1E1530',
                            nav:      '#120D1F',
                        },
                    },
                    fontFamily: {
                        heading: ['Space Grotesk', 'system-ui', 'sans-serif'],
                        sans:    ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}">

    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"
            integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+"
            crossorigin="anonymous"></script>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>

    <script src="{{ url_for('static', path='js/app.js') }}"></script>

    {% block extra_head %}{% endblock %}
</head>
<body class="bg-surface-base text-white font-sans min-h-screen relative overflow-hidden">
    {# Full-bleed gradient background #}
    <div class="absolute inset-0 z-0">
        <img src="{{ url_for('static', path='images/brand/farveflade-4x.jpg') }}"
             alt="" aria-hidden="true"
             class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-surface-base/85"></div>
    </div>
    {# QR pattern overlay #}
    <div class="absolute inset-0 z-0 flex items-center justify-center pointer-events-none">
        <img src="{{ url_for('static', path='images/brand/qr-pattern-4x.png') }}"
             alt="" aria-hidden="true"
             class="w-[600px] h-[600px] object-contain opacity-[0.07]">
    </div>
    <div class="relative z-10">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
